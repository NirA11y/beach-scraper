<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Beach Scraper{% endblock %}</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #334155;
            --border: #475569;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --accent: #38bdf8;
            --accent2: #0ea5e9;
            --success: #4ade80;
            --warn: #fbbf24;
            --error: #f87171;
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent2); }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .navbar h1 { font-size: 18px; font-weight: 600; }
        .navbar nav { display: flex; gap: 16px; }
        .navbar nav a { color: var(--text2); font-size: 14px; }
        .navbar nav a:hover { color: var(--text); }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h2 { font-size: 16px; margin-bottom: 12px; color: var(--accent); }
        .card h3 { font-size: 14px; margin-bottom: 8px; color: var(--text2); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }
        .btn:hover { background: var(--border); }
        .btn-primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
        .btn-primary:hover { background: var(--accent); }
        .btn-danger { border-color: var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: #fff; }
        .btn-success { border-color: var(--success); color: var(--success); }
        .btn-success:hover { background: var(--success); color: #000; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        input, select, textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            padding: 8px 12px;
            font-size: 13px;
            width: 100%;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            text-align: left;
            padding: 8px 12px;
            background: var(--surface2);
            color: var(--text2);
            font-weight: 500;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        td {
            padding: 6px 12px;
            border-bottom: 1px solid var(--border);
        }
        tr:hover td { background: rgba(56, 189, 248, 0.05); }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-success { background: rgba(74, 222, 128, 0.15); color: var(--success); }
        .badge-warn { background: rgba(251, 191, 36, 0.15); color: var(--warn); }
        .badge-error { background: rgba(248, 113, 113, 0.15); color: var(--error); }
        .badge-info { background: rgba(56, 189, 248, 0.15); color: var(--accent); }

        .grid { display: grid; gap: 16px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }

        .flex { display: flex; align-items: center; gap: 8px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .gap-sm { gap: 4px; }
        .mt-8 { margin-top: 8px; }
        .mt-16 { margin-top: 16px; }
        .mb-8 { margin-bottom: 8px; }
        .mb-16 { margin-bottom: 16px; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        .toast-success { background: var(--success); color: #000; }
        .toast-error { background: var(--error); color: #fff; }
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 { margin-bottom: 16px; }

        .validation-list { list-style: none; }
        .validation-list li { padding: 4px 0; font-size: 13px; }
        .validation-list .error { color: var(--error); }
        .validation-list .warn { color: var(--warn); }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text2);
        }
        .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .container { padding: 16px; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="navbar">
        <h1>Beach Scraper</h1>
        <nav>
            <a href="/">Dashboard</a>
        </nav>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div id="toast-container"></div>
    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function apiCall(url, method = 'GET', body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(url, opts);
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || 'Request failed');
            return data;
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
